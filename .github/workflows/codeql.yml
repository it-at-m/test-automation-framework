name: CodeQL Advanced

env:
  analyze-java: true
  java-buildmode: autobuild
  java-version: 21
  analyze-javascript-typescript-vue: false
  analyze-python: false
  analysis-query: security-and-quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    name: Check changed files and directories
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      java: ${{ steps.filter.outputs.java }}
      javascript-typescript-vue: ${{ steps.filter.outputs.javascript-typescript-vue }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Checkout repository
        uses: it-at-m/lhm_actions/action-templates/actions/action-checkout@7cb754b2056cebda6c36db344434f85be398c493 # v1.0.25
      - name: Path Filter
        id: filter
        uses: it-at-m/lhm_actions/action-templates/actions/action-filter@7cb754b2056cebda6c36db344434f85be398c493 # v1.0.25

  codeql-java:
    name: Analyze Java source files
    runs-on: ubuntu-latest
    needs: check-changes
    strategy:
      fail-fast: false
      matrix:
        build-path: ["./"]
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-codeql@7cb754b2056cebda6c36db344434f85be398c493 # v1.0.25
        if: ${{ env.analyze-java == 'true' && (github.ref_name == 'main' || needs.check-changes.outputs.java == 'true') }}
        with:
          codeql-language: java-kotlin
          codeql-buildmode: ${{ env.java-buildmode }}
          codeql-query: ${{ env.analysis-query }}
          java-version: ${{ env.java-version }}
          path: ${{ matrix.build-path }}
